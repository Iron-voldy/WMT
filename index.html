<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMT Quiz Master</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- LOGIN PAGE -->
    <div id="loginPage" class="page active">
        <div class="login-container">
            <div class="login-header">
                <div class="login-icon">📚</div>
                <h1>WMT Quiz Master</h1>
                <p>SE2020 - Web Technologies and Mobile</p>
            </div>
            <form id="loginForm" onsubmit="return false;">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter username" autocomplete="off">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter password">
                </div>
                <div id="loginError" class="error-msg"></div>
                <button type="button" id="loginBtn" onclick="handleLogin()">Login 🚀</button>
            </form>
        </div>
    </div>

    <!-- DASHBOARD PAGE -->
    <div id="dashboardPage" class="page">
        <div class="dashboard-header">
            <h1>📚 WMT Quiz Master</h1>
            <p>Welcome, Haritha! Choose a quiz to begin.</p>
            <button class="logout-btn" onclick="handleLogout()">Logout 🚪</button>
        </div>
        <div class="cards-container" id="cardsContainer">
            <!-- Cards generated by JS -->
        </div>
    </div>

    <!-- QUIZ PAGE -->
    <div id="quizPage" class="page">
        <div class="quiz-header">
            <button class="back-btn" onclick="goToDashboard()">← Back</button>
            <h2 id="quizTitle"></h2>
            <div class="quiz-progress">
                <span id="questionNum">1</span> / <span id="totalQuestions">35</span>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>
        </div>
        <div class="quiz-body">
            <div class="question-card" id="questionCard">
                <h3 id="questionText"></h3>
                <div id="optionsContainer" class="options-container"></div>
                <div id="explanationBox" class="explanation-box hidden"></div>
            </div>
            <div class="quiz-nav">
                <button id="nextBtn" class="next-btn" onclick="nextQuestion()" disabled>Next Question →</button>
            </div>
        </div>
    </div>

    <!-- RESULTS PAGE -->
    <div id="resultsPage" class="page">
        <div class="results-container">
            <div id="resultEmojis" class="result-emojis"></div>
            <h1 id="resultTitle"></h1>
            <div id="scoreDisplay" class="score-display"></div>
            <p id="resultMessage"></p>
            <div id="memeContainer" class="meme-container"></div>
            <div class="result-actions">
                <button onclick="retryQuiz()">Retry 🔄</button>
                <button onclick="goToDashboard()">Back to Dashboard 🏠</button>
            </div>
        </div>
    </div>

    <script src="questions.js"></script>
    <script src="app.js"></script>
</body>
</html>
